# ETL gratuit : GitHub Actions (plan gratuit — repo public : minutes largement suffisantes).
# Pas besoin de worker Render payant : une exécution planifiée + bouton "Run workflow" manuel.
#
# À configurer dans GitHub : Settings → Secrets and variables → Actions → New repository secret :
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
# Optionnel (téléchargement auto des CSV Kaggle) :
#   KAGGLE_USERNAME
#   KAGGLE_KEY

name: ETL pipeline

on:
  schedule:
    # Chaque lundi 02:00 UTC (identique au défaut ETL_SCHEDULE du projet)
    - cron: "0 2 * * 1"
  workflow_dispatch: {}

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        working-directory: etl

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL (single execution)
        run: python scheduler.py run
