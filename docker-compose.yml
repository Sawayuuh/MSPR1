services:
  # API FastAPI
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mspr_api
    # Linux : sans ceci, host.docker.internal ne se résout pas → erreur DNS / 500 sur les routes Supabase
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Hôte : éviter conflit si 8000 déjà utilisé (ex. autre conteneur / api locale)
      - "8002:8000"
    environment:
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - etl
    networks:
      - mspr_network

  # Interface web Next.js (proxy API vers le service `api`)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: mspr_web
    ports:
      # Hôte : défaut 8003 (évite le conflit avec d’autres apps sur 8000, ex. dashboards Python).
      # Forcer 8000 : WEB_PORT=8000 dans `.env` après avoir arrêté l’autre service sur ce port.
      - "${WEB_PORT:-8003}:3000"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - mspr_network

  # Service ETL
  etl:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: mspr_etl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
      - ETL_SCHEDULE=${ETL_SCHEDULE:-0 */6 * * *}
    volumes:
      - ./etl:/app
      - ./etl/data:/app/data
    command: python scheduler.py run
    networks:
      - mspr_network
    restart: unless-stopped

networks:
  mspr_network:
    driver: bridge

volumes:
  etl_data:
    driver: local


